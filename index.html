<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="YT Residence">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#ffffff">
  <link rel="manifest" href="manifest.json">
  <title>YT Residence</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      margin: 0;
      padding: 0;
    }
    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <iframe
    id="appFrame"
    src="https://script.google.com/macros/s/AKfycbzNBbfqOuQN7jqQ6KUxm7tTQE02lZWnywrHXyB7c7SUOODFSgg_HLlWSFN0x-2uP4lfmQ/exec"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads"
    allow="fullscreen"
    loading="eager">
  </iframe>
  <script>
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbzNBbfqOuQN7jqQ6KUxm7tTQE02lZWnywrHXyB7c7SUOODFSgg_HLlWSFN0x-2uP4lfmQ/exec';
    // On iOS, iframe + google.script.run causes auth redirects → white screen.
    // iOS users get a direct redirect instead.
    if (/iPad|iPhone|iPod/.test(navigator.userAgent)) {
      document.getElementById('appFrame').style.display = 'none';
      window.location.replace(GAS_URL);
    } else {
      history.pushState(null, '', window.location.href);
      window.addEventListener('popstate', function() {
        history.pushState(null, '', window.location.href);
      });
    }
  </script>
</body>
</html>
